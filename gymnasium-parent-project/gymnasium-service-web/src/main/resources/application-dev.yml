#端口号配置
server:
  port: 8089
#数据库连接配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gymnasium?serverTimezone=GMT%2B8&useSSL=false&characterEncoding=utf8
    username: root
    password: root

  servlet:
    multipart:
      max-file-size: 200MB #设置单个文件的大小 因为springboot内置tomact的的文件传输默认为10MB
      max-request-size: 500MB #设置单次请求的文件总大小
      enabled: true #设置该参数，否则不生效

#mybatis plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      #配置mybatis plus 在更新时只更新非空和非NULL的字段
      update-strategy: not_empty
# 定义日志文件的输出格式
logging:
  pattern:
    console: '%d{yyyy-MM-dd} [%thread] %-5level %logger- %msg%n'
# minio配置
minio:
  endpoint: http://127.0.0.1:9000
  accesskey: minioadmin
  secretKey: minioadmin